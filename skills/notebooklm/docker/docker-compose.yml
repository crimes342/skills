services:
  hermes-notebooklm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DISPLAY=:99
      - CLOAK_HEADLESS=true
      - CLOAK_HUMANIZE=true
      - CLOAK_CDP_HOST=127.0.0.1
      - CLOAK_CDP_PORT=9222
      - NOTEBOOKLM_HOME=/root/.notebooklm
      - NOTEBOOKLM_PROFILE=default
      - NOTEBOOKLM_REFRESH_CMD=python3 /app/cloak2nlm_bridge.py
    volumes:
      - cloak-profiles:/data/cloak_profiles
      - notebooklm-data:/root/.notebooklm
      - cloak-cache:/root/.cloakbrowser
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "python3", "-c", "from cloakbrowser import launch; launch(headless=True).close()"]
      interval: 60s
      timeout: 30s
      retries: 3

volumes:
  cloak-profiles:
  notebooklm-data:
  cloak-cache:
